<style>
  /* Base structural enforcement */
  * { border-radius: 0 !important; }
  .collapsed-border-grid {
    border-top: 1px solid #000;
    border-left: 1px solid #000;
  }
  .collapsed-border-grid > div {
    border-right: 1px solid #000;
    border-bottom: 1px solid #000;
  }
</style>

<body class="bg-surface-container-lowest text-primary font-body-md min-h-screen flex flex-col antialiased selection:bg-primary selection:text-surface-container-lowest">
<!-- Minimal Header for Focused View -->
<header class="flex items-center px-margin-mobile md:px-margin-desktop py-md border-b border-primary bg-surface-container-lowest sticky top-0 z-10">
<button aria-label="Go back" class="flex items-center justify-center p-xs mr-md hover:bg-primary hover:text-surface-container-lowest transition-colors border border-transparent hover:border-primary">
<span class="material-symbols-outlined" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-headline-md tracking-tight uppercase">Active Scan</h1>
</header>
<!-- Main Content Area -->
<main class="flex-grow flex flex-col items-center py-xl px-margin-mobile md:px-margin-desktop">
<div class="w-full max-w-3xl flex flex-col gap-xl">
<!-- Primary Progress Block -->
<section class="flex flex-col gap-md">
<div class="flex justify-between items-end border-b border-primary pb-xs">
<h2 class="font-headline-lg-mobile md:font-headline-lg tracking-tight">SCANNING DRIVE C:</h2>
<span class="font-display text-4xl">68%</span>
</div>
<!-- Thick, structural progress bar -->
<div class="h-16 w-full border border-primary bg-surface-container-lowest p-[2px]">
<div class="h-full bg-primary transition-all duration-500 ease-in-out relative" style="width: 68%;">
<div class="absolute right-2 top-1/2 -translate-y-1/2 text-surface-container-lowest font-label-sm uppercase tracking-widest">Running</div>
</div>
</div>
</section>
<!-- Structural Metrics Grid (Collapsed Borders) -->
<section class="collapsed-border-grid grid grid-cols-1 md:grid-cols-3 bg-surface-container-lowest">
<div class="p-lg flex flex-col items-center justify-center text-center gap-xs">
<span class="font-headline-lg tracking-tighter">1.2 GB/s</span>
<span class="font-label-sm uppercase text-secondary tracking-widest">Transfer Speed</span>
</div>
<div class="p-lg flex flex-col items-center justify-center text-center gap-xs">
<span class="font-headline-lg tracking-tighter">45.2M</span>
<span class="font-label-sm uppercase text-secondary tracking-widest">Sectors Analyzed</span>
</div>
<div class="p-lg flex flex-col items-center justify-center text-center gap-xs">
<span class="font-headline-lg tracking-tighter">12,345</span>
<span class="font-label-sm uppercase text-secondary tracking-widest">Objects Found</span>
</div>
</section>
<!-- Live Categories List -->
<section class="flex flex-col border border-primary p-lg gap-md">
<h3 class="font-label-sm uppercase tracking-widest border-b border-primary pb-sm mb-sm">Live Categorization</h3>
<div class="flex flex-col gap-sm">
<!-- Category Row -->
<div class="flex items-center gap-md">
<span class="w-32 font-label-md uppercase">Images</span>
<div class="flex-grow h-2 border border-primary bg-surface-container-lowest flex items-stretch">
<div class="bg-primary" style="width: 45%;"></div>
</div>
<span class="w-16 text-right font-label-md">4,200</span>
</div>
<!-- Category Row -->
<div class="flex items-center gap-md">
<span class="w-32 font-label-md uppercase">Documents</span>
<div class="flex-grow h-2 border border-primary bg-surface-container-lowest flex items-stretch">
<div class="bg-primary" style="width: 80%;"></div>
</div>
<span class="w-16 text-right font-label-md">8,150</span>
</div>
<!-- Category Row -->
<div class="flex items-center gap-md">
<span class="w-32 font-label-md uppercase">System</span>
<div class="flex-grow h-2 border border-primary bg-surface-container-lowest flex items-stretch">
<div class="bg-primary" style="width: 5%;"></div>
</div>
<span class="w-16 text-right font-label-md">120</span>
</div>
<!-- Category Row -->
<div class="flex items-center gap-md">
<span class="w-32 font-label-md uppercase text-secondary">Unknown</span>
<div class="flex-grow h-2 border border-secondary bg-surface-container-lowest flex items-stretch">
<div class="bg-secondary" style="width: 2%;"></div>
</div>
<span class="w-16 text-right font-label-md text-secondary">25</span>
</div>
</div>
</section>
<!-- Action Area -->
<section class="flex flex-col sm:flex-row gap-md justify-end mt-lg">
<button class="px-xl py-sm bg-surface-container-lowest text-primary border border-primary font-label-sm uppercase tracking-widest hover:bg-primary hover:text-surface-container-lowest transition-colors min-w-[160px]">
          Cancel
        </button>
<button class="px-xl py-sm bg-primary text-surface-container-lowest border border-primary font-label-sm uppercase tracking-widest hover:bg-surface-container-lowest hover:text-primary transition-colors min-w-[160px]">
          Pause
        </button>
</section>
</div>
</main>
</body></html>
